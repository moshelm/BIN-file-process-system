services:
  parser-service:
    build: 
      context: .
      dockerfile: process_service/Dockerfile
    container_name: bin-parser
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: 2.0
    environment:
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
  flet-app:
    build: 
      context: .
      dockerfile: ui/Dockerfile 
    container_name: flet_telemetry
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - FLET_SERVER_PORT=8000
      - FLET_SERVER_IP=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      parser-service: 
        condition: service_healthy
    restart: always
