services:
  parser-service:
    build: 
      context: .
      dockerfile: process-service/Dockerfile
    container_name: bin-parser
    ports:
      - "8001:8001"
    volumes:
      - ./process-service/app:/app
      - ./shared:/shared     
    environment:
      - PYTHONPATH=.:/
      - PYTHONUNBUFFERED=1
      - ENV=development
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
  flet-app:
    build: 
      context: .
      dockerfile: ui/Dockerfile 
    container_name: flet_telemetry
    ports:
      - "8000:8000"
    volumes:
      - ./ui/app:/app
      - ./shared:/shared
    environment:
      - PYTHONPATH=.:/
      - BIN_PARSER_URI=http://parser-service:8001/process
      - FLET_SERVER_PORT=8000
      - FLET_SERVER_IP=0.0.0.0
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      parser-service: 
        condition: service_healthy
    restart: always
